<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>اعرض خدمتك / شقتك</title>

    <style>
     /* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Cairo', sans-serif; /* نفس الخط المتناسق والمعرب المعتمد */
}

body {
  background: #050816; /* نفس الخلفية الداكنة العميقة */
  color: white;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  transition: background .4s, color .4s;
}

/* دعم الوضع الفاتح */
body.light {
  background: #f3f7ff;
  color: #111;
}

/* ===========================
   Container (الصندوق الزجاجي المطور)
=========================== */

.container {
  width: 100%;
  max-width: 500px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: 24px;
  padding: 30px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
}

body.light .container {
  background: rgba(255, 255, 255, 0.85);
  border-color: rgba(0, 0, 0, 0.05);
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.04);
}

/* ===========================
   Title (العنوان النيون)
=========================== */

.title {
  text-align: center;
  margin-bottom: 25px;
  font-size: 24px;
  font-weight: 900;
  background: linear-gradient(90deg, #00e5ff, #7c4dff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ===========================
   Choices (أزرار التبديل الخيارات)
=========================== */

.choices {
  display: flex;
  gap: 12px;
  margin-bottom: 25px;
}

.choice {
  flex: 1;
  padding: 14px;
  border-radius: 14px;
  text-align: center;
  cursor: pointer;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.06);
  color: rgba(255, 255, 255, 0.8);
  font-weight: bold;
  font-size: 15px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

body.light .choice {
  background: rgba(0, 0, 0, 0.03);
  border: none;
  color: #444;
}

/* عند مرور الماوس على الخيار */
.choice:hover {
  border-color: #00e5ff;
  color: #00e5ff;
}

body.light .choice:hover {
  color: #7c4dff;
}

/* الخيار النشط (المحدد) */
.choice.active {
  background: linear-gradient(90deg, #00e5ff, #7c4dff);
  color: #fff;
  border-color: transparent;
  box-shadow: 0 5px 20px rgba(0, 229, 255, 0.25);
}

body.light .choice.active {
  box-shadow: 0 5px 20px rgba(124, 77, 255, 0.25);
}

/* ===========================
   Form & Inputs
=========================== */

.form {
  display: none;
}

.form.active {
  display: block;
}

input {
  width: 100%;
  padding: 14px 18px;
  margin-bottom: 15px;
  border-radius: 14px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  background: rgba(255, 255, 255, 0.05);
  font-size: 16px;
  color: white;
  outline: none;
  transition: all 0.3s;
}

input:focus {
  border-color: #00e5ff;
  box-shadow: 0 0 15px rgba(0, 229, 255, 0.15);
  background: rgba(255, 255, 255, 0.08);
}

body.light input {
  background: rgba(255, 255, 255, 0.9);
  border-color: rgba(0, 0, 0, 0.1);
  color: #111;
}

body.light input:focus {
  border-color: #7c4dff;
  box-shadow: 0 0 15px rgba(124, 77, 255, 0.15);
}

/* ===========================
   Submit Button
=========================== */

button {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(90deg, #00e5ff, #7c4dff);
  color: #fff;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 5px 20px rgba(0, 229, 255, 0.25);
  transition: all 0.4s ease;
}

button:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 25px rgba(0, 229, 255, 0.4);
  opacity: 0.95;
}

body.light button {
  box-shadow: 0 5px 20px rgba(124, 77, 255, 0.25);
}
body.light button:hover {
  box-shadow: 0 8px 25px rgba(124, 77, 255, 0.4);
}

/* ===========================
   Mobile Optimization
=========================== */

@media (max-width: 600px) {
  body {
    align-items: flex-start;
    padding: 0;
  }

  .container {
    max-width: 100%;
    height: 100vh;
    border-radius: 0;
    border: none;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: #050816; /* جعل الحاوية بملء الشاشة على الموبايل لمنع الحواف البيضاء */
  }

  body.light .container {
    background: #f3f7ff;
  }
}
    </style>
  </head>

  <body>
    <div class="container">
      <div class="title">اعرض خدمتك أو شقتك</div>

      <div class="choices">
        <div class="choice active" onclick="switchType('service', this)">
          خدمة
        </div>
        <div class="choice" onclick="switchType('apartment', this)">شقة</div>
      </div>

      <div id="service" class="form active">
        <input
          type="text"
          id="serviceName"
          placeholder="نوع الخدمة (سباك - كهربائي)"
        />
        <input type="text" id="servicePhone" placeholder="رقمك" />
        <button onclick="sendService()">إرسال</button>
      </div>

      <div id="apartment" class="form">
        <input type="text" id="area" placeholder="المنطقة" />
        <input type="text" id="building" placeholder="رقم العمارة" />
        <input type="text" id="apt" placeholder="رقم الشقة" />
        <input type="text" id="price" placeholder="السعر" />

        <button onclick="sendApartment()">إرسال</button>
      </div>
    </div>

    <script>
      function switchType(type, el) {
        document
          .querySelectorAll(".choice")
          .forEach((c) => c.classList.remove("active"));
        el.classList.add("active");

        document
          .querySelectorAll(".form")
          .forEach((f) => f.classList.remove("active"));
        document.getElementById(type).classList.add("active");
      }

      function sendService() {
        let name = document.getElementById("serviceName").value;
        let phone = document.getElementById("servicePhone").value;

        let msg = `عايز أعرض خدمة:
${name}
رقمي: ${phone}`;

        openWhatsApp(msg);
      }

      function sendApartment() {
        let area = document.getElementById("area").value;
        let building = document.getElementById("building").value;
        let apt = document.getElementById("apt").value;
        let price = document.getElementById("price").value;

        let msg = `عايز أعرض شقة:
المنطقة: ${area}
العمارة: ${building}
الشقة: ${apt}
السعر: ${price}
`;

        openWhatsApp(msg);
      }

      function openWhatsApp(message) {
        let phone = "201152638852";
        let url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;
        window.open(url, "_blank");
      }
    </script>
  </body>
</html>
