<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سكن جامعة اللوتس</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        scroll-behavior: smooth;
        font-family: "Cairo", sans-serif;
      }

      body {
        background: #050816;
        color: white;
        overflow-x: hidden;
        transition: background 0.4s, color 0.4s;
      }

      body.light {
        background: #f3f7ff;
        color: #111;
      }

      /* =================================
         Navbar (شريط التنقل الزجاجي)
      ================================= */
      .navbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 15px 8%;
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        direction: rtl;
        position: relative; /* مهم جداً لضبط تموضع القائمة المنسدلة */
        z-index: 1000;
        transition: 0.3s;
      }

      body.light .navbar {
        background: rgba(255, 255, 255, 0.7);
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      }

      .nav-links {
        display: flex;
        gap: 25px;
        font-size: 16px;
        list-style: none;
      }

      .nav-links a {
        text-decoration: none;
        color: rgba(255, 255, 255, 0.7);
        font-size: 14px;
        font-weight: bold;
        transition: 0.3s;
      }

      .nav-links a:hover {
        color: #00e5ff;
      }

      body.light .nav-links a {
        color: #444;
      }
      body.light .nav-links a:hover {
        color: #7c4dff;
      }

      /* === تنسيق زر الثلاث شرط المفقود === */
      .menu-toggle {
        display: none; /* مخفي في الكمبيوتر ويظهر فقط في الموبايل */
        cursor: pointer;
        flex-direction: column;
        gap: 5px;
      }

      .menu-toggle .bar {
        width: 25px;
        height: 3px;
        background-color: white;
        border-radius: 2px;
        transition: 0.3s ease;
      }

      /* تلوين الشرط باللون الأسود في الوضع الفاتح */
      body.light .menu-toggle .bar {
        background-color: #111;
      }

      /* أنيميشن تحويل الثلاث شرط إلى (X) عند الفتح */
      .menu-toggle.open .bar:nth-child(1) {
        transform: translateY(8px) rotate(45deg);
      }
      .menu-toggle.open .bar:nth-child(2) {
        opacity: 0;
      }
      .menu-toggle.open .bar:nth-child(3) {
        transform: translateY(-8px) rotate(-45deg);
      }

      .theme-toggle {
        background: linear-gradient(90deg, #00e5ff, #7c4dff);
        color: white;
        border: none;
        padding: 8px 18px;
        border-radius: 50px;
        cursor: pointer;
        font-size: 14px;
        font-weight: bold;
        transition: 0.4s;
      }

      .theme-toggle:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
      }

      /* ===========================
         Hero Section
      =========================== */
      .hero {
        position: relative;
        min-height: 500px;
        background: url("./خلفيه.png") no-repeat center/cover;
        display: flex;
        align-items: center;
        padding: 40px 8%;
        color: #fff;
        overflow: hidden;
      }

      .hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(5, 8, 22, 0.85),
          rgba(124, 77, 255, 0.2)
        );
      }

      .hero-content {
        position: relative;
        max-width: 600px;
        z-index: 2;
      }

      .hero h1 {
        font-size: 48px;
        font-weight: 900;
        margin-bottom: 15px;
        line-height: 1.3;
      }

      .hero h1 span {
        background: linear-gradient(90deg, #00e5ff, #7c4dff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .hero p {
        margin-bottom: 30px;
        color: rgba(255, 255, 255, 0.8);
        font-size: 18px;
        line-height: 1.8;
      }

      body.light .hero p {
        color: rgba(255, 255, 255, 0.9);
      }

      /* ===========================
         Buttons
      =========================== */
      .btns {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
      }

      .btn {
        padding: 14px 28px;
        border-radius: 16px;
        border: none;
        cursor: pointer;
        font-weight: bold;
        font-size: 15px;
        transition: 0.4s;
      }

      .btn-primary {
        background: linear-gradient(90deg, #00e5ff, #7c4dff);
        color: #fff;
        box-shadow: 0 0 30px rgba(0, 229, 255, 0.25);
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: white;
        backdrop-filter: blur(10px);
      }

      .btn:hover {
        transform: translateY(-4px) scale(1.02);
      }

      body.light .btn-secondary {
        background: rgba(255, 255, 255, 0.2);
        border-color: rgba(255, 255, 255, 0.4);
        color: #fff;
      }

      /* ===========================
         Cards
      =========================== */
      .cards {
        display: flex;
        gap: 20px;
        padding: 30px 8%;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        scrollbar-width: none;
      }

      .cards::-webkit-scrollbar {
        display: none;
      }

      .card {
        min-width: 200px;
        height: 160px;
        border-radius: 24px;
        background-size: cover;
        background-position: center;
        position: relative;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding: 15px;
        color: #fff;
        font-weight: bold;
        scroll-snap-align: start;
        transition: 0.4s ease;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(5, 8, 22, 0.8), transparent);
        z-index: 1;
        transition: 0.3s;
      }

      .card span {
        position: relative;
        z-index: 2;
        font-size: 16px;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
      }

      .card:hover {
        transform: translateY(-8px);
        border-color: #00e5ff;
        box-shadow: 0 15px 30px rgba(0, 229, 255, 0.2);
      }

      body.light .card {
        border-color: rgba(0, 0, 0, 0.05);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      }
      body.light .card:hover {
        border-color: #7c4dff;
        box-shadow: 0 15px 30px rgba(124, 77, 255, 0.15);
      }

      /* ===========================
         Info Section
      =========================== */
      .info {
        display: flex;
        justify-content: space-around;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.06);
        margin: 20px 8% 40px 8%;
        padding: 25px;
        border-radius: 24px;
        text-align: center;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }

      body.light .info {
        background: rgba(255, 255, 255, 0.85);
        border-color: rgba(0, 0, 0, 0.06);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
      }

      /* =================================
         الشاشات الصغيرة والموبايل (Responsive)
      ================================= */
      @media (max-width: 768px) {
        .navbar {
          padding: 15px 5%;
        }

        /* تحويل القائمة إلى قائمة منسدلة عمودية مخفية افتراضياً */
        .nav-links {
          display: none; 
          flex-direction: column;
          position: absolute;
          top: 100%;
          left: 0;
          width: 100%;
          background: rgba(5, 8, 22, 0.95);
          backdrop-filter: blur(25px);
          -webkit-backdrop-filter: blur(25px);
          padding: 25px 0;
          text-align: center;
          gap: 20px;
          border-bottom: 1px solid rgba(255, 255, 255, 0.1);
          box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        /* تعديل خلفية القائمة المنسدلة في الوضع الفاتح */
        body.light .nav-links {
          background: rgba(255, 255, 255, 0.95);
          border-bottom: 1px solid rgba(0, 0, 0, 0.05);
          box-shadow: 0 15px 30px rgba(0,0,0,0.05);
        }

        /* الكلاس الفعال الذي سيتم إضافته بالجافا سكريبت لإظهار القائمة */
        .nav-links.active {
          display: flex;
        }

        .nav-links a {
          font-size: 16px;
          display: block;
          padding: 10px 0;
        }

        /* إظهار زر الثلاث شرط الآن */
        .menu-toggle {
          display: flex;
        }

        .hero {
          min-height: 400px;
          text-align: center;
          padding: 30px 5%;
        }

        .hero h1 {
          font-size: 32px;
        }

        .hero p {
          font-size: 15px;
        }

        .btns {
          justify-content: center;
        }

        .cards {
          padding: 20px 5%;
          gap: 15px;
        }

        .card {
          min-width: 170px;
          height: 130px;
        }

        .card span {
          font-size: 14px;
        }

        .info {
          flex-direction: column;
          gap: 20px;
          margin: 15px 5% 30px 5%;
          padding: 20px;
        }

        /* شاشة التحميل */
        #preloader {
          position: fixed;
          inset: 0;
          background: #050816;
          z-index: 10000;
          display: flex;
          align-items: center;
          justify-content: center;
          transition: opacity 0.5s ease, visibility 0.5s;
        }

        .spinner {
          width: 50px;
          height: 50px;
          border: 5px solid rgba(255, 255, 255, 0.1);
          border-top-color: #00e5ff;
          border-radius: 50%;
          animation: spin 1s linear infinite;
        }

        @keyframes spin {
          to { transform: rotate(360deg); }
        }

        #preloader.fade-out {
          opacity: 0;
          visibility: hidden;
        }
      }
    </style>
  </head>

  <body>
    <div id="preloader">
      <div class="spinner"></div>
    </div>

    <nav class="navbar">
      <div class="menu-toggle" id="mobile-menu">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>

      <ul class="nav-links">
        <li><a href="عن السكن.html">دليلك للسكن</a></li>
        <li><a href="الخدمات .html">المرافق والخدمات</a></li>
        <li><a href="اعرض شقتك.html">اعرض خدمتك / شقتك</a></li>
        <li><a href="تواصل معنا.html">تواصل معنا</a></li>
      </ul>

      <div class="logo-zone">
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
      </div>
    </nav>

    <div class="hero">
      <div class="hero-content">
        <h1>سكن جامعة اللوتس</h1>
        <p>اختار سكنك الصح من هنا</p>

        <div class="btns">
          <a href="https://wa.me/201152638852" target="_blank" class="btn btn-primary">احجز الآن</a>
          <a href="تواصل معنا.html" target="_blank" class="btn btn-primary">للاستفسار</a>
        </div>
      </div>
    </div>

    <div class="cards">
      <a href="77.html" class="card" style="background-image: url('./77.jpg')"><span>ال77 عماره</span></a>
      <a href="ال7 عماير.html" class="card" style="background-image: url('./7 عماير.jpg')"><span>السبع عمائر</span></a>
      <a href="الحكوميه.html" class="card" style="background-image: url('./حكوميه.jpg')"><span>الحكوميه</span></a>
      <a href="القرنفل.html" class="card" style="background-image: url('./القرنفل.png')"><span>القرنفل</span></a>
      <a href="ابني بيتك.html" class="card" style="background-image: url('./ابني بيتك.png')"><span>ابني بيتك</span></a>
      <a href="سكن مصر.html" class="card" style="background-image: url('./سكن مصر.jpeg')"><span>سكن مصر</span></a>
      <a href="البريطانيه.html" class="card" style="background-image: url('./البريطانيه.jpeg')"><span>البريطانيه</span></a>
    </div>

    <div class="info">
      <div>📍 المنيا الجديدة - كمين الصفا</div>
      <div>📞 01152638862</div>
    </div>

    <script src="dark.js"></script>

    <script>
      // كود تشغيل شاشة التحميل (Preloader)
      window.addEventListener('load', function() {
        const preloader = document.getElementById('preloader');
        if(preloader) {
          preloader.classList.add('fade-out');
        }
      });

      // كود فتح وإغلاق القائمة للموبايل وتأثير الأنيميشن للزر
      const mobileMenu = document.getElementById('mobile-menu');
      const navLinks = document.querySelector('.nav-links');

      mobileMenu.addEventListener('click', () => {
        navLinks.classList.toggle('active');     // فتح/إغلاق القائمة 
        mobileMenu.classList.toggle('open');     // تحويل الثلاث شرط إلى X وعكسها
      });

      // إغلاق القائمة تلقائياً إذا قام المستخدم بالضغط على أي رابط بداخلها
      document.querySelectorAll('.nav-links a').forEach(link => {
        link.addEventListener('click', () => {
          navLinks.classList.remove('active');
          mobileMenu.classList.remove('open');
        });
      });
    </script>
  </body>
</html>
