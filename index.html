<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سكن جامعة اللوتس</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        scroll-behavior: smooth;
        font-family: "Cairo", sans-serif; /* استخدام نفس الخط المتناسق */
      }

      body {
        background: #050816; /* نفس الخلفية الداكنة العميقة الفخمة */
        color: white;
        overflow-x: hidden;
        transition:
          background 0.4s,
          color 0.4s;
      }

      /* الوضع الفاتح المتناسق */
      body.light {
        background: #f3f7ff;
        color: #111;
      }

      /* ===========================
   Navbar (شريط التنقل الزجاجي)
=========================== */

      .navbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 15px 8%;
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        direction: rtl; /* ضبط الاتجاه ليكون متناسقاً عربيًا */
        transition: 0.3s;
      }

      body.light .navbar {
        background: rgba(255, 255, 255, 0.7);
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      }

      .nav-links {
        display: flex;
        gap: 25px;
        font-size: 16px;
      }

      .nav-links a {
        text-decoration: none;
        color: rgba(255, 255, 255, 0.7);
        font-size: 14px;
        font-weight: bold;
        transition: 0.3s;
      }

      .nav-links a:hover {
        color: #00e5ff; /* تأثير السيان المضيء عند التمرير */
      }

      body.light .nav-links a {
        color: #444;
      }
      body.light .nav-links a:hover {
        color: #7c4dff;
      }

      .theme-toggle {
        background: linear-gradient(90deg, #00e5ff, #7c4dff);
        color: white;
        border: none;
        padding: 8px 18px;
        border-radius: 50px;
        cursor: pointer;
        font-size: 14px;
        font-weight: bold;
        transition: 0.4s;
      }

      .theme-toggle:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
      }

      /* ===========================
   Hero Section
=========================== */

      .hero {
        position: relative;
        min-height: 500px;
        background: url("./خلفيه.png") no-repeat center/cover;
        display: flex;
        align-items: center;
        padding: 40px 8%;
        color: #fff;
        overflow: hidden;
      }

      /* طبقة حماية داكنة ناعمة فوق الصورة لراحة العين */
      .hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(5, 8, 22, 0.85),
          rgba(124, 77, 255, 0.2)
        );
      }

      .hero-content {
        position: relative;
        max-width: 600px;
        z-index: 2;
      }

      .hero h1 {
        font-size: 48px;
        font-weight: 900;
        margin-bottom: 15px;
        line-height: 1.3;
      }

      .hero h1 span {
        background: linear-gradient(90deg, #00e5ff, #7c4dff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .hero p {
        margin-bottom: 30px;
        color: rgba(255, 255, 255, 0.8);
        font-size: 18px;
        line-height: 1.8;
      }

      body.light .hero p {
        color: rgba(
          255,
          255,
          255,
          0.9
        ); /* الحفاظ على وضوح النص فوق طبقة الهيرو */
      }

      /* ===========================
   Buttons
=========================== */

      .btns {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
      }

      .btn {
        padding: 14px 28px;
        border-radius: 16px;
        border: none;
        cursor: pointer;
        font-weight: bold;
        font-size: 15px;
        transition: 0.4s;
      }

      .btn-primary {
        background: linear-gradient(90deg, #00e5ff, #7c4dff);
        color: #fff;
        box-shadow: 0 0 30px rgba(0, 229, 255, 0.25);
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: white;
        backdrop-filter: blur(10px);
      }

      .btn:hover {
        transform: translateY(-4px) scale(1.02);
      }

      body.light .btn-secondary {
        background: rgba(255, 255, 255, 0.2);
        border-color: rgba(255, 255, 255, 0.4);
        color: #fff;
      }

      /* ===========================
   Cards (سلايدر الكروت الزجاجي اللامع)
=========================== */

      .cards {
        display: flex;
        gap: 20px;
        padding: 30px 8%;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        scrollbar-width: none; /* إخفاء شريط التمرير الافتراضي المزعج */
      }

      .cards::-webkit-scrollbar {
        display: none;
      }

      .card {
        min-width: 200px;
        height: 160px;
        border-radius: 24px;
        background-size: cover;
        background-position: center;
        position: relative;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding: 15px;
        color: #fff;
        font-weight: bold;
        scroll-snap-align: start;
        transition: 0.4s ease;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        overflow: hidden;
      }

      /* تأثير التظليل الداخلي للكارت ليظهر الكلام بوضوح */
      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(5, 8, 22, 0.8), transparent);
        z-index: 1;
        transition: 0.3s;
      }

      .card span {
        position: relative;
        z-index: 2;
        font-size: 16px;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
      }

      .card:hover {
        transform: translateY(-8px);
        border-color: #00e5ff;
        box-shadow: 0 15px 30px rgba(0, 229, 255, 0.2);
      }

      body.light .card {
        border-color: rgba(0, 0, 0, 0.05);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      }
      body.light .card:hover {
        border-color: #7c4dff;
        box-shadow: 0 15px 30px rgba(124, 77, 255, 0.15);
      }

      /* ===========================
   Info Section (صندوق البيانات السفلي)
=========================== */

      .info {
        display: flex;
        justify-content: space-around;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.06);
        margin: 20px 8% 40px 8%;
        padding: 25px;
        border-radius: 24px;
        text-align: center;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }

      body.light .info {
        background: rgba(255, 255, 255, 0.85);
        border-color: rgba(0, 0, 0, 0.06);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
      }

      /* إلغاء أكواد الدارك مود القديمة واستبدالها بالبنية الجديدة المرنة */
      body.dark {
        /* تم دمج الخصائص مباشرة في البنية الفوقية لتجنب تكرار الكود ولجعل الأنيميشن والتحويل ناعم وسلس */
      }

      /* ===========================
   Mobile Responsiveness
=========================== */

      @media (max-width: 768px) {
        .navbar {
          padding: 15px 5%;
        }

        .nav-links {
          gap: 15px;
        }

        .nav-links a {
          font-size: 13px;
        }

        .hero {
          min-height: 400px;
          text-align: center;
          padding: 30px 5%;
        }

        .hero h1 {
          font-size: 32px;
        }

        .hero p {
          font-size: 15px;
        }

        .btns {
          justify-content: center;
        }

        .cards {
          padding: 20px 5%;
          gap: 15px;
        }

        .card {
          min-width: 170px;
          height: 130px;
        }

        .card span {
          font-size: 14px;
        }

        .info {
          flex-direction: column;
          gap: 20px;
          margin: 15px 5% 30px 5%;
          padding: 20px;
        }
      }
    </style>
  </head>

  <body>
    <div class="navbar">
      <div class="nav-links">
