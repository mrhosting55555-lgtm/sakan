<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سكن جامعة اللوتس</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        scroll-behavior: smooth;
        font-family: "Cairo", sans-serif;
      }

      body {
        background: #050816;
        color: white;
        overflow-x: hidden;
        transition:
          background 0.4s ease,
          color 0.4s ease;
      }

      /* =================================
         الوضع الفاتح الشامل والمتناسق (Light Mode)
      ================================= */
      body.light {
        background: #f3f7ff;
        color: #111111;
      }

      body.light .navbar {
        background: rgba(255, 255, 255, 0.8);
        border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      }

      body.light .nav-links a {
        color: #333333 !important; /* تلوين النصوص بالداكن في الوضع الفاتح */
      }

      body.light .nav-links a:hover {
        color: #7c4dff !important;
      }

      body.light .menu-toggle .bar {
        background-color: #111111 !important; /* تحويل الـ 3 شرط للون الأسود في الوضع الفاتح */
      }

      body.light .card {
        border-color: rgba(0, 0, 0, 0.1);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      }

      body.light .info {
        background: rgba(255, 255, 255, 0.9);
        border-color: rgba(0, 0, 0, 0.08);
        color: #111111;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      }

      /* إضافة تأثير النعومة لجميع العناصر عند التغيير */
      .navbar,
      .nav-links,
      .menu-toggle .bar,
      .card,
      .info,
      a {
        transition:
          background 0.4s ease,
          color 0.4s ease,
          border-color 0.4s ease,
          box-shadow 0.4s ease;
      }

      /* =================================
          Navbar (شريط التنقل الزجاجي)
       ================================= */
      .navbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 15px 8%;
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        direction: rtl;
        position: relative; /* مهم جداً لضبط تموضع القائمة المنسدلة */
        z-index: 1000;
      }

      .nav-links {
        display: flex;
        gap: 25px;
        font-size: 16px;
        list-style: none;
      }

      .nav-links a {
        text-decoration: none;
        color: rgba(255, 255, 255, 0.7);
        font-size: 14px;
        font-weight: bold;
      }

      .nav-links a:hover {
        color: #00e5ff;
      }

      /* === تنسيق زر الثلاث شرط المطور === */
      .menu-toggle {
        display: none; /* مخفي في الكمبيوتر ويظهر فقط في الموبايل */
        cursor: pointer;
        flex-direction: column;
        gap: 5px;
      }

      .menu-toggle .bar {
        width: 25px;
        height: 3px;
        background-color: white;
        border-radius: 2px;
        transition: 0.3s ease;
      }

      /* أنيميشن تحويل الثلاث شرط إلى (X) عند الفتح */
      .menu-toggle.open .bar:nth-child(1) {
        transform: translateY(8px) rotate(45deg);
      }
      .menu-toggle.open .bar:nth-child(2) {
        opacity: 0;
      }
      .menu-toggle.open .bar:nth-child(3) {
        transform: translateY(-8px) rotate(-45deg);
      }

      .theme-toggle {
        background: linear-gradient(90deg, #00e5ff, #7c4dff);
        color: white;
        border: none;
        padding: 8px 18px;
        border-radius: 50px;
        cursor: pointer;
        font-size: 14px;
        font-weight: bold;
        transition: 0.4s;
      }

      .theme-toggle:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
      }

      /* ===========================
          Hero Section
       =========================== */
      .hero {
        position: relative;
        min-height: 500px;
        background: url("./خلفيه.png") no-repeat center/cover;
        display: flex;
        align-items: center;
        padding: 40px 8%;
        color: #fff;
        overflow: hidden;
      }

      .hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(5, 8, 22, 0.85),
          rgba(124, 77, 255, 0.2)
        );
      }

      .hero-content {
        position: relative;
        max-width: 600px;
        z-index: 2;
      }

      .hero h1 {
        font-size: 48px;
        font-weight: 900;
        margin-bottom: 15px;
        line-height: 1.3;
      }

      .hero h1 span {
        background: linear-gradient(90deg, #00e5ff, #7c4dff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .hero p {
        margin-bottom: 30px;
        color: rgba(255, 255, 255, 0.8);
        font-size: 18px;
        line-height: 1.8;
      }

      body.light .hero p {
        color: rgba(255, 255, 255, 0.9);
      }

      /* ===========================
          Buttons
       =========================== */
      .btns {
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
      }

      .btn {
        padding: 14px 28px;
        border-radius: 16px;
        border: none;
        cursor: pointer;
        font-weight: bold;
        font-size: 15px;
        transition: 0.4s;
      }

      .btn-primary {
        background: linear-gradient(90deg, #00e5ff, #7c4dff);
        color: #fff;
        box-shadow: 0 0 30px rgba(0, 229, 255, 0.25);
      }

      .btn-secondary {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        color: white;
        backdrop-filter: blur(10px);
      }

      .btn:hover {
        transform: translateY(-4px) scale(1.02);
      }

      body.light .btn-secondary {
        background: rgba(255, 255, 255, 0.2);
        border-color: rgba(255, 255, 255, 0.4);
        color: #fff;
      }

      /* ===========================
          Cards
       =========================== */
      .cards {
        display: flex;
        gap: 20px;
        padding: 30px 8%;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        scrollbar-width: none;
      }

      .cards::-webkit-scrollbar {
        display: none;
      }

      .card {
        min-width: 200px;
        height: 160px;
        border-radius: 24px;
        background-size: cover;
        background-position: center;
        position: relative;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding: 15px;
        color: #fff;
        font-weight: bold;
        scroll-snap-align: start;
        transition: 0.4s ease;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(5, 8, 22, 0.8), transparent);
        z-index: 1;
        transition: 0.3s;
      }

      .card span {
        position: relative;
        z-index: 2;
        font-size: 16px;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
      }

      .card:hover {
        transform: translateY(-8px);
        border-color: #00e5ff;
        box-shadow: 0 15px 30px rgba(0, 229, 255, 0.2);
      }

      /* =================================
          الشاشات الصغيرة والموبايل (Responsive)
       ================================= */
      @media (max-width: 768px) {
        .navbar {
          padding: 15px 5%;
          position: relative;
          z-index: 9999 !important; /* رفع شريط التنقل بالكامل فوق أي عنصر شفاف */
        }

        /* تحويل القائمة إلى قائمة منسدلة عمودية مخفية افتراضياً */
        .nav-links {
          display: none;
          flex-direction: column;
          position: absolute;
          top: 100%;
          left: 0;
          width: 100%;
          background: rgba(
            5,
            8,
            22,
            0.98
          ); /* زيادة تعتيم الخلفية لضمان القراءة بوضوح */
          backdrop-filter: blur(25px);
          -webkit-backdrop-filter: blur(25px);
          padding: 25px 0;
          text-align: center;
          gap: 20px;
          border-bottom: 1px solid rgba(255, 255, 255, 0.1);
          box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
          z-index: 9998;
        }

        /* تعديل خلفية القائمة المنسدلة في الوضع الفاتح */
        body.light .nav-links {
          background: rgba(255, 255, 255, 0.98);
          border-bottom: 1px solid rgba(0, 0, 0, 0.05);
          box-shadow: 0 15px 30px rgba(0, 0, 0, 0.05);
        }

        /* الكلاس الفعال الذي سيتم إضافته بالجافا سكريبت لإظهار القائمة */
        .nav-links.active {
          display: flex;
        }

        .nav-links a {
          font-size: 16px;
          display: block;
          padding: 10px 0;
        }

        /* إظهار زر الثلاث شرط الآن بشكل صريح ومستجيب للمس */
        .menu-toggle {
          display: flex;
          position: relative;
          z-index: 10000; /* إعطاء الزر أعلى طبقة ممكنة ليسبق أي عنصر شفاف */
          padding: 5px; /* تكبير مساحة الضغط لإصبع المستخدم */
        }

        .hero {
          min-height: 400px;
          text-align: center;
          padding: 80px 5% 30px 5%; /* مسافة علوية لتجنب تداخل شريط التنقل */
        }

        .hero-content {
          position: relative;
          z-index: 1; /* خفض طبقة محتوى الهيرو حتى لا يغطي على شريط التنقل */
        }

        .hero h1 {
          font-size: 32px;
        }

        .hero p {
          font-size: 15px;
        }

        .btns {
          justify-content: center;
        }

        .cards {
          padding: 20px 5%;
          gap: 15px;
        }

        .card {
          min-width: 170px;
          height: 130px;
        }

        .card span {
          font-size: 14px;
        }

        .info {
          flex-direction: column;
          gap: 20px;
          margin: 15px 5% 30px 5%;
          padding: 20px;
        }

        /* شاشة التحميل */
        #preloader {
          position: fixed;
          inset: 0;
          background: #050816;
          z-index: 10000;
          display: flex;
          align-items: center;
          justify-content: center;
          transition:
            opacity 0.5s ease,
            visibility 0.5s;
        }

        .spinner {
          width: 50px;
          height: 50px;
          border: 5px solid rgba(255, 255, 255, 0.1);
          border-top-color: #00e5ff;
          border-radius: 50%;
          animation: spin 1s linear infinite;
        }

        @keyframes spin {
          to {
            transform: rotate(360deg);
          }
        }

        #preloader.fade-out {
          opacity: 0;
          visibility: hidden;
        }
      }
    </style>
  </head>
