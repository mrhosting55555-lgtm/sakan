<!doctype html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <title>الخدمات</title>

    <style>
     body {
  font-family: 'Cairo', sans-serif; /* استخدام الخط المتناسق مع باقي الصفحات */
  background: #050816; /* نفس الخلفية الداكنة العميقة */
  color: #ffffff;
  padding: 40px 20px;
  direction: rtl;
  transition: background .4s, color .4s;
}

/* دعم الوضع الفاتح المتناسق */
body.light {
  background: #f3f7ff;
  color: #111;
}

/* ===========================
   Title (العنوان الرئيسي)
=========================== */

.title {
  text-align: center;
  font-size: 32px;
  font-weight: 900;
  margin-bottom: 40px;
  background: linear-gradient(90deg, #00e5ff, #7c4dff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ===========================
   Container
=========================== */

.container {
  max-width: 1200px;
  margin: auto;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); /* تحسين العرض قليلاً */
  gap: 20px; /* زيادة الفراغات لتنفس العناصر */
}

/* ===========================
   Card (الكارت الزجاجي المضيء)
=========================== */

.card {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: 24px; /* حواف دائرية أكثر مرونة وعصرية */
  padding: 25px 20px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
  text-align: center;
  transition: 0.4s ease;
}

.card:hover {
  transform: translateY(-8px);
  border-color: #00e5ff;
  box-shadow: 0 15px 30px rgba(0, 229, 255, 0.15);
}

/* كروت الوضع الفاتح */
body.light .card {
  background: rgba(255, 255, 255, 0.85);
  border-color: rgba(0, 0, 0, 0.05);
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.04);
}

body.light .card:hover {
  border-color: #7c4dff;
  box-shadow: 0 15px 30px rgba(124, 77, 255, 0.12);
}

/* ===========================
   Card Content & Button
=========================== */

.name {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 20px;
  color: #ffffff;
  transition: color .3s;
}

body.light .name {
  color: #111;
}

.call-btn {
  display: block;
  background: linear-gradient(90deg, #00e5ff, #7c4dff); /* استبدال الأخضر التقليدي بالتدريج المضيء */
  color: #fff;
  padding: 12px;
  border-radius: 14px;
  text-decoration: none;
  font-weight: bold;
  font-size: 15px;
  box-shadow: 0 4px 15px rgba(0, 229, 255, 0.2);
  transition: 0.3s ease;
}

.call-btn:hover {
  transform: scale(1.03);
  box-shadow: 0 6px 20px rgba(0, 229, 255, 0.4);
  opacity: 0.95;
}

body.light .call-btn {
  box-shadow: 0 4px 15px rgba(124, 77, 255, 0.2);
}
body.light .call-btn:hover {
  box-shadow: 0 6px 20px rgba(124, 77, 255, 0.35);
}
    </style>
  </head>

  <body>
    <div class="title">الخدمات في المنطقة</div>

    <div class="container" id="services"></div>

    <script>
      const services = [
        { name: "سوبر ماركت كيمت", phone: "01016132032" },

        { name: "القرطبي أنابيب", phone: "01017280277" },
        { name: "صيدلية د. مروه", phone: "01063500929" },
        { name: "صيدلية د. أحمد اسماعيل", phone: "01126999444" },
        { name: "صيدلية د. أحمد اسماعيل", phone: "01010771112" },
        { name: "صيدلية د. أحمد اسماعيل", phone: "01126999888" },
        { name: "كريم أنابيب", phone: "01098155996" },

        { name: "كهربائي عمرو احمد", phone: "01020327131" },
        { name: "كهربائي محمد زين", phone: "01000622314" },
        { name: "سباك هيثم", phone: "01097687540" },
        { name: "سباك محمد شعبان", phone: "01096996152" },
        { name: "سباك ابانوب", phone: "01550506315" },

      ];

      const container = document.getElementById("services");

      services.forEach((s) => {

        card.className = "card";

        card.innerHTML = `
    <div class="name">${s.name}</div>

  `;

        container.appendChild(card);
      });
    </script>
  </body>
</html>
