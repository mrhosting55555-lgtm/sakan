<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>شقق جامعة اللوتس</title>
    <link rel="stylesheet" href="style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>

  <body>
    <header>
      <div class="logo">
        <h1>جامعة اللوتس</h1>
      </div>
      <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    </header>

    <!-- البحث -->
    <div class="search-box">
      <input
        type="text"
        id="searchInput"
        placeholder="🔍ابحث عن شقة ..."
        onkeyup="render()"
      />
    </div>

    <!-- الفلتر -->
    <div class="filter-buttons">
      <button onclick="filterApartments('all')">🏠 الكل</button>
      <button onclick="filterApartments('girls')">👩 بنات</button>
      <button onclick="filterApartments('boys')">👨 شباب</button>
    </div>

    <!-- الشقق -->
    <div class="container" id="app"></div>

    <script>
      let currentFilter = "all";
      const apartments = [
        {
          name: "شقة دور خامس عمارة 141 العمارة بنات وشباب متاحة للحجز السنة الجديده",
          location: "ال7 عماير",
          price: "",
          type: "girls",
          images: ["./الشقق/ال 7 عماير/عماره 141/vid.mp4"],
        },
        {
          name: "شقة دور خامس عماره ١٤٢ عمارة أهالي وبنات وشباب متاحة للحجز السنة الجديده",
          location: "ال7 عماير",
          price: "",
          type: "girls",
          images: ["./الشقق/ال 7 عماير/عماره 142/vid.mp4"],
        },

        {
          name: "شقة دور تاني عمارة 152 مقفلة كلها حديد وكل الفرش جديد حاليا مفروشة ومتنضفة، كل الفرش جديد",
          location: "ال7 عماير",
          price: "",
          type: "girls",
          images: ["./الشقق/ال 7 عماير/عماره 152/vid.mp4"],
        },

        {
          name: "شقة دور رابع عماره 141",
          location: "ال7 عماير",
          price: "",
          type: "girls",
          images: ["./الشقق/ال 7 عماير/عماره 141/الدور الرابع/vid.mp4"],
        },

        {
          name: "شقة دور تالت عماره 152 متاحه سمر ",
          location: "ال7 عماير",
          price: "1000$",
          type: "girls",
          images: ["./الشقق"],
        },
      ];

      function filterApartments(type) {
        currentFilter = type;
        render();
      }

      function render() {
        const app = document.getElementById("app");
        app.innerHTML = "";

        const search = document
          .getElementById("searchInput")
          .value.toLowerCase();

        apartments
          .filter(
            (apt) =>
              (currentFilter == "all" || apt.type == currentFilter) &&
              (apt.name.toLowerCase().includes(search) ||
                apt.location.toLowerCase().includes(search)),
          )

          .forEach((apt) => {
            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `

        <div class="slider">

            ${apt.images
              .map((file, i) => {
                if (file.endsWith(".mp4")) {
                  return `
                        <video class="${i == 0 ? "active" : ""}" controls>
                            <source src="${file}" type="video/mp4">
                        </video>
                        `;
                }

                return `
                    <img src="${file}" class="${i == 0 ? "active" : ""}">
                    `;
              })
              .join("")}

            <div class="nav">
                <button onclick="prev(this)">❮</button>
                <button onclick="next(this)">❯</button>
            </div>

        </div>

        <div class="card-content">

            <div class="title">
                ${apt.name}
            </div>

            <div class="action-btn">

                <div class="price-btn">
                    ${apt.price}
                </div>

                <div class="book-btn"
                onclick="bookNow('${apt.name}','${apt.location}','${apt.price}')">

                    احجز

                </div>

            </div>

        </div>

        `;

            app.appendChild(card);
          });
      }

      render();

      function next(btn) {
        let slider = btn.closest(".slider");
        let items = slider.querySelectorAll("img,video");

        let index = [...items].findIndex((el) =>
          el.classList.contains("active"),
        );

        items[index].classList.remove("active");

        items[(index + 1) % items.length].classList.add("active");
      }

      function prev(btn) {
        let slider = btn.closest(".slider");
        let items = slider.querySelectorAll("img,video");

        let index = [...items].findIndex((el) =>
          el.classList.contains("active"),
        );

        items[index].classList.remove("active");

        items[(index - 1 + items.length) % items.length].classList.add(
          "active",
        );
      }

      function bookNow(name, location, price) {
        let phone = "201152638852";

        let message = `عايز احجز :

${name}

الموقع : ${location}

السعر : ${price}`;

        let url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

        window.open(url, "_blank");
      }
    </script>

    <script src="dark.js"></script>
  </body>
</html>
