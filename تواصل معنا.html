<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تواصل معنا</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #f5f7fa, #e4e7eb);
        min-height: 100vh;
        padding-bottom: 90px; /* مساحة في الأسفل حتى لا يغطي الشريط على المحتوى */
        box-sizing: border-box;
      }

      *, *::before, *::after {
        box-sizing: inherit;
      }

      .header {
        background: #111;
        color: white;
        text-align: center;
        padding: 30px 15px;
      }

      .header h1 {
        margin: 0 0 10px 0;
        font-size: 28px;
      }

      .header p {
        margin: 0;
        font-size: 16px;
        opacity: 0.8;
      }

      .container {
        width: 100%;
        max-width: 600px; /* تم تقليله ليكون متناسقاً أكثر بين اللاب والموبايل */
        margin: 20px auto;
        padding: 0 15px;
      }

      .card {
        background: white;
        border-radius: 15px;
        padding: 20px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }

      input,
      textarea {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 16px; /* يمنع الزووم التلقائي المزعج في هواتف الآيفون */
        outline: none;
        transition: border-color 0.3s;
      }

      input:focus, textarea:focus {
        border-color: #25d366;
      }

      textarea {
        height: 120px;
        resize: none;
      }

      .btn {
        background: #25d366;
        color: white;
        padding: 12px;
        border-radius: 8px;
        cursor: pointer;
        border: none;
        font-size: 16px;
        font-weight: bold;
        transition: background 0.3s;
      }

      .btn:hover {
        background: #20ba56;
      }

      /* شريط الأيقونات السفلي - متجاوب */
      .bottom-dock {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 25px;
        padding: 12px 24px;
        border-radius: 30px;
        background: rgba(169, 169, 169, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        z-index: 9999;
        transition: all 0.3s ease;
      }

      .bottom-dock a {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .bottom-dock img {
        width: 38px;
        height: 38px;
        object-fit: contain;
        transition: transform 0.3s ease;
      }

      /* تأثيرات الـ Hover للابتوب فقط */
      @media (min-width: 769px) {
        .bottom-dock img:hover {
          transform: translateY(-8px) scale(1.15);
        }
      }

      /* شاشات الموبايل والأجهزة اللوحية الصغيرة */
      @media (max-width: 768px) {
        .header {
          padding: 25px 10px;
        }
        .header h1 { font-size: 24px; }
        .header p { font-size: 14px; }

        .bottom-dock {
          bottom: 0;
          left: 0;
          transform: none;
          width: 100%;
          border-radius: 0; /* تحويله لشريط مستقيم أسفل الشاشة تماماً */
          justify-content: center;
          gap: 40px;
          padding: 15px;
          background: rgba(255, 255, 255, 0.95); /* خلفية بيضاء مريحة للعين في الموبايل */
          border-top: 1px solid #e4e7eb;
        }

        .bottom-dock img {
          width: 34px;
          height: 34px;
        }
        
        body {
          padding-bottom: 80px; /* لمنع تداخل المحتوى مع الشريط السفلي */
        }
      }
    </style>
  </head>

  <body>
    <div class="header">
      <h1>تواصل معنا</h1>
      <p>يسعدنا تواصلك معنا</p>
    </div>

    <div class="container">
      <div class="card">
        <form onsubmit="contactWhatsApp(event)">
          <input type="text" id="name" placeholder="الاسم" required />

          <textarea
            id="message"
            placeholder="اكتب رسالتك..."
            required
          ></textarea>

          <button class="btn" type="submit">إرسال عبر واتساب</button>
        </form>
      </div>
    </div>

    <div class="bottom-dock">
      <a href="https://wa.me/201152638852" target="_blank">
        <img src="whatsapp.png" alt="WhatsApp" />
      </a>

      <a href="https://t.me/Hooda55555" target="_blank">
        <img src="Telegram.png" alt="Telegram" />
      </a>

      <a href="https://www.facebook.com/share/g/1KmaE6Zdiq/" target="_blank">
        <img src="Facebook.png" alt="Facebook" />
      </a>
    </div>

    <script>
      function contactWhatsApp(e) {
        e.preventDefault();

        let phone = "201152638852";
        let name = document.getElementById("name").value.trim();
        let message = document.getElementById("message").value.trim();

        if (!name || !message) {
          alert("من فضلك املأ البيانات");
          return;
        }

        let fullMessage = `الاسم: ${name}\nالرسالة: ${message}`;
        let url = `https://wa.me/${phone}?text=${encodeURIComponent(fullMessage)}`;

        window.open(url, "_blank");
      }
    </script>
  </body>
</html>
