<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>تواصل معنا</title>

    <style>
      body {
        margin: 0;
        font-family: Arial;
        background: linear-gradient(to right, #f5f7fa, #e4e7eb);
      }

      .header {
        background: #111;
        color: white;
        text-align: center;
        padding: 40px 20px;
      }

      .container {
        max-width: 900px;
        margin: 30px auto;
        padding: 20px;
      }

      .card {
        background: white;
        border-radius: 20px;
        padding: 25px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      input,
      textarea {
        padding: 10px;
        border-radius: 10px;
        border: 1px solid #ccc;
      }

      textarea {
        height: 100px;
        resize: none;
      }

      .btn {
        background: #25d366;
        color: white;
        padding: 10px;
        border-radius: 10px;
        cursor: pointer;
        border: none;
        font-size: 16px;
      }

      .floating-menu {
        position: fixed;
        bottom: 30px;
        right: 30px;
      }

      .main-btn {
        width: 60px;
        height: 60px;
        background: #111;
        color: #fff;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 26px;
        cursor: pointer;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        transition: 0.3s;
      }

      .floating-menu.active .main-btn {
        transform: rotate(60deg);
      }

      .item {
        position: absolute;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        text-decoration: none;
        font-weight: bold;

        opacity: 0;
        transform: scale(0);
        transition: all 0.4s ease;
      }

      .whatsapp {
        background: #25d366;
      }
      .facebook {
        background: #1877f2;
      }
      .telegram {
        background: #0088cc;
      }

      .floating-menu.active .whatsapp {
        transform: translate(-75px, -50px) scale(1);
        opacity: 3;
      }

      .floating-menu.active .telegram {
        transform: translate(-25px, -130px) scale(1);
        opacity: 1;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <h1>تواصل معنا</h1>
      <p>يسعدنا تواصلك معنا</p>
    </div>

    <div class="container">
      <div class="card">
        <form onsubmit="contactWhatsApp(event)">
          <input type="text" id="name" placeholder="الاسم" required />

          <textarea
            id="message"
            placeholder="اكتب رسالتك..."
            required
          ></textarea>

          <button class="btn" type="submit">إرسال عبر واتساب</button>
        </form>
      </div>
    </div>

    <div class="floating-menu">
      <div class="main-btn" onclick="toggleMenu()">+</div>

      <a href="https://wa.me/201152638852" target="_blank" class="item whatsapp"
        >W</a
      >
      <a href="https://t.me/Hooda55555" target="_blank" class="item telegram"
        >T</a
      >
    </div>

    <script>
      function contactWhatsApp(e) {
        e.preventDefault();

        let phone = "201152638852";

        let name = document.getElementById("name").value;
        let message = document.getElementById("message").value;

        if (!name || !message) {
          alert("من فضلك املأ البيانات");
          return;
        }

        let fullMessage = `الاسم: ${name}
       الرسالة: ${message}`;

        let url = `https://wa.me/${phone}?text=${encodeURIComponent(fullMessage)}`;

        window.open(url, "_blank");
      }

      function toggleMenu() {
        document.querySelector(".floating-menu").classList.toggle("active");
      }
    </script>
  </body>
</html>
