<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تواصل معنا</title>

    <style>
     body {
  margin: 0;
  font-family: 'Cairo', sans-serif; /* نفس الخط المتناسق */
  background: #050816; /* نفس الخلفية الداكنة العميقة */
  color: white;
  min-height: 100vh;
  padding-bottom: 110px; /* زيادة المساحة في الأسفل لراحة شريط الـ Dock */
  box-sizing: border-box;
  direction: rtl; /* ضبط الاتجاه ليكون متناسقاً عربيًا */
  transition: background .4s, color .4s;
}

/* دعم الوضع الفاتح */
body.light {
  background: #f3f7ff;
  color: #111;
}

*, *::before, *::after {
  box-sizing: inherit;
}

/* ===========================
   Header (الهيدر الزجاجي)
=========================== */

.header {
  background: rgba(255, 255, 255, 0.03);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  color: white;
  text-align: center;
  padding: 40px 15px;
  transition: .3s;
}

body.light .header {
  background: rgba(255, 255, 255, 0.7);
  border-bottom: 1px solid rgba(0, 0, 0, 0.05);
  color: #111;
}

.header h1 {
  margin: 0 0 10px 0;
  font-size: 32px;
  font-weight: 900;
  background: linear-gradient(90deg, #00e5ff, #7c4dff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.header p {
  margin: 0;
  font-size: 16px;
  color: rgba(255, 255, 255, 0.7);
}

body.light .header p {
  color: #555;
}

/* ===========================
   Container & Card (الفورم)
=========================== */

.container {
  width: 100%;
  max-width: 600px;
  margin: 40px auto;
  padding: 0 15px;
}

.card {
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: 24px;
  padding: 30px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
}

body.light .card {
  background: rgba(255, 255, 255, 0.85);
  border-color: rgba(0, 0, 0, 0.05);
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.04);
}

form {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ===========================
   Inputs & Textarea
=========================== */

input,
textarea {
  width: 100%;
  padding: 14px 18px;
  border-radius: 14px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  background: rgba(255, 255, 255, 0.05);
  font-size: 16px;
  color: white;
  outline: none;
  transition: all 0.3s;
}

input:focus, textarea:focus {
  border-color: #00e5ff;
  box-shadow: 0 0 15px rgba(0, 229, 255, 0.15);
  background: rgba(255, 255, 255, 0.08);
}

body.light input,
body.light textarea {
  background: rgba(255, 255, 255, 0.9);
  border-color: rgba(0, 0, 0, 0.1);
  color: #111;
}

body.light input:focus, 
body.light textarea:focus {
  border-color: #7c4dff;
  box-shadow: 0 0 15px rgba(124, 77, 255, 0.15);
}

textarea {
  height: 130px;
  resize: none;
}

/* ===========================
   Submit Button
=========================== */

.btn {
  background: linear-gradient(90deg, #00e5ff, #7c4dff);
  color: white;
  padding: 14px;
  border-radius: 14px;
  cursor: pointer;
  border: none;
  font-size: 16px;
  font-weight: bold;
  box-shadow: 0 5px 20px rgba(0, 229, 255, 0.25);
  transition: all 0.4s;
}

.btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 25px rgba(0, 229, 255, 0.4);
  opacity: 0.95;
}

body.light .btn {
  box-shadow: 0 5px 20px rgba(124, 77, 255, 0.25);
}
body.light .btn:hover {
  box-shadow: 0 8px 25px rgba(124, 77, 255, 0.4);
}

/* ===========================
   Bottom Dock (شريط الأيقونات الزجاجي السفلي)
=========================== */

.bottom-dock {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 25px;
  padding: 12px 28px;
  border-radius: 40px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
  z-index: 9999;
  transition: all 0.4s ease;
}

body.light .bottom-dock {
  background: rgba(255, 255, 255, 0.75);
  border-color: rgba(0, 0, 0, 0.06);
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
}

.bottom-dock a {
  display: flex;
  justify-content: center;
  align-items: center;
}

.bottom-dock img {
  width: 38px;
  height: 38px;
  object-fit: contain;
  transition: transform 0.3s ease;
}

/* تأثيرات الـ Hover المضيئة للابتوب */
@media (min-width: 769px) {
  .bottom-dock img:hover {
    transform: translateY(-10px) scale(1.2);
    filter: drop-shadow(0 5px 10px rgba(0, 229, 255, 0.5));
  }
}

/* ===========================
   Mobile Optimization
=========================== */

@media (max-width: 768px) {
  .header {
    padding: 30px 10px;
  }
  .header h1 { font-size: 26px; }
  .header p { font-size: 14px; }

  .container {
    margin: 20px auto;
  }

  .card {
    padding: 20px;
    border-radius: 20px;
  }

  .bottom-dock {
    bottom: 0;
    left: 0;
    transform: none;
    width: 100%;
    border-radius: 0; /* كامل العرض على الموبايل كشريط سفلي أصلي */
    border-inline: none;
    justify-content: center;
    gap: 45px;
    padding: 16px;
    background: rgba(5, 8, 22, 0.85); /* شفافية داكنة متناسقة */
    border-top: 1px solid rgba(255, 255, 255, 0.08);
  }

  body.light .bottom-dock {
    background: rgba(255, 255, 255, 0.92);
    border-top: 1px solid rgba(0, 0, 0, 0.05);
  }

  .bottom-dock img {
    width: 34px;
    height: 34px;
  }
  
  body {
    padding-bottom: 95px; /* لمنع الكروت أو الفورم من النزول تحت الدوك في الموبايل */
  }
}
    </style>
  </head>

  <body>
    <div class="header">
      <h1>تواصل معنا</h1>
      <p>يسعدنا تواصلك معنا</p>
    </div>

    <div class="container">
      <div class="card">
        <form onsubmit="contactWhatsApp(event)">
          <input type="text" id="name" placeholder="الاسم" required />

          <textarea
            id="message"
            placeholder="اكتب رسالتك..."
            required
          ></textarea>

          <button class="btn" type="submit">إرسال عبر واتساب</button>
        </form>
      </div>
    </div>

    <div class="bottom-dock">
      <a href="https://wa.me/201152638852" target="_blank">
        <img src="whatsapp.png" alt="WhatsApp" />
      </a>

      <a href="https://t.me/Hooda55555" target="_blank">
        <img src="Telegram.png" alt="Telegram" />
      </a>

      <a href="https://www.facebook.com/share/g/1KmaE6Zdiq/" target="_blank">
        <img src="Facebook.png" alt="Facebook" />
      </a>
    </div>

    <script>
      function contactWhatsApp(e) {
        e.preventDefault();

        let phone = "201152638852";
        let name = document.getElementById("name").value.trim();
        let message = document.getElementById("message").value.trim();

        if (!name || !message) {
          alert("من فضلك املأ البيانات");
          return;
        }

        let fullMessage = `الاسم: ${name}\nالرسالة: ${message}`;
        let url = `https://wa.me/${phone}?text=${encodeURIComponent(fullMessage)}`;

        window.open(url, "_blank");
      }
    </script>
  </body>
</html>
